<footer class="main-footer">
  <div class="footer-container">
    <div class="footer-grid">

      <!-- Columna marca -->
      <div class="footer-col branding">
        <h2 class="footer-logo">
          <h2 class="footer-logo">OptimScul</h2>
        </h2>
        <p>Transformando la gestión educativa con tecnología intuitiva y segura.</p>
        <div class="social-links">
          <a *ngFor="let red of redesSociales" [href]="red.enlace">
            <i [class]="red.icono"></i>
          </a>
        </div>
      </div>

      <!-- Columna plataforma -->
      <div class="footer-col">
        <h4>Plataforma</h4>
        <ul>
          <li *ngFor="let item of columnaPlataforma">
            <a [routerLink]="item.enlace" [fragment]="item.fragmento">
              {{ item.texto }}
            </a>
          </li>
        </ul>
      </div>

      <!-- Columna recursos -->
      <div class="footer-col">
        <h4>Recursos</h4>
        <ul>
          <li *ngFor="let item of columnaRecursos">
            <a [routerLink]="item.enlace">{{ item.texto }}</a>
          </li>
        </ul>
      </div>

      <!-- Columna contacto -->
      <div class="footer-col">
        <h4>Contacto</h4>
        <ul class="contact-info">
          <li><i class="fas fa-envelope"></i> soporte&#64;optimscul.com</li>
          <li><i class="fas fa-phone"></i> +57 (300) 123-4567</li>
          <li><i class="fas fa-map-marker-alt"></i> Bogotá, Colombia</li>
        </ul>
      </div>

    </div>

    <div class="footer-bottom">
      <!-- {{ anioActual }} muestra el año calculado en el .ts -->
      <p>&copy; {{ anioActual }} OptimScul. Todos los derechos reservados.</p>
    </div>
  </div>
</footer>
