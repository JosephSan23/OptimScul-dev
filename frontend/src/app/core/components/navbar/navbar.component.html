<header class="navbar" [class.header-active]="isScrolled">
  <div class="capsule">

    <!-- Logo: hace de "Inicio", con su propio aire -->
    <a class="logo-title" routerLink="/">
      <img src="assets/img/logo1.png" class="logo-icon" alt="OptimScul logo">
      <span class="text-left">Optim<span class="text-right">Scul</span></span>
    </a>

    <!-- Grupo de navegación: enlaces + acción, compactos entre sí -->
    <div class="cap-group">
      <nav class="cap-nav">
        <ul>
          <!-- SIN sesión -->
          <ng-container *ngIf="!logueado">
            <li class="dropdown">
              <a href="#" class="dropbtn nav-link" (click)="$event.preventDefault()">
                Plataforma <i class="fas fa-chevron-down"></i>
              </a>
              <ul class="dropdown-content">
                <li><a routerLink="/" fragment="problem">El Desafío</a></li>
                <li><a routerLink="/" fragment="solutions">Soluciones</a></li>
                <li><a routerLink="/" fragment="features">Características</a></li>
                <li><a routerLink="/" fragment="capabilities">Infraestructura</a></li>
              </ul>
            </li>
            <li><a routerLink="/primeros-pasos" class="nav-link">Primeros Pasos</a></li>
            <li><a routerLink="/login" class="nav-link">Acceso</a></li>
          </ng-container>

          <!-- CON sesión -->
          <ng-container *ngIf="logueado">
            <li><a routerLink="/primeros-pasos" class="nav-link">Primeros Pasos</a></li>
            <li><a routerLink="/contacto" class="nav-link">Contacto</a></li>
            <li><a routerLink="/seguimiento" class="nav-link">Seguimiento</a></li>
          </ng-container>
        </ul>
      </nav>

      <!-- SIN sesión: único botón (CTA) -->
      <a *ngIf="!logueado" routerLink="/registro" class="btn-register">Registrarse</a>

      <!-- CON sesión: solo el circulito de perfil; el menú se abre al clic -->
      <div class="user-menu" *ngIf="logueado">
        <div class="avatar-wrapper" (click)="toggleDropdown($event)">
          <div class="avatar">{{ iniciales }}</div>
          <div class="status-indicator"></div>
        </div>

        <div class="user-dropdown" [class.active]="dropdownAbierto">
          <div class="dropdown-header">
            <p>{{ usuario?.username }}</p>
            <span>{{ rolPrincipal }}</span>
          </div>
          <ul class="dropdown-list">
            <li><i class="ti ti-user"></i>Mi Perfil</li>
            <li class="logout-item" (click)="cerrarSesion()"><i class="ti ti-logout"></i>Cerrar sesión</li>
          </ul>
        </div>
      </div>
    </div>

  </div>
</header>
