<div class="page-header">
  <h1>Configuración académica</h1>
  <p>Reglas de notas, periodos y asistencia de tu institución</p>
</div>

<div *ngIf="cargando" class="estado-msg">
  <i class="ti ti-loader-2 girando"></i> Cargando...
</div>

<div class="config-form" *ngIf="!cargando">
  <div class="config-form-card">
    <h3 class="grupo-titulo"><i class="ti ti-calendar"></i> Periodos</h3>
    <div class="form-grid">
      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.usaPeriodos"
            [ngModelOptions]="{ standalone: true }"
          />
          Usa periodos</label
        >
      </div>
      <div class="campo" *ngIf="form.usaPeriodos">
        <label>Número de periodos</label>
        <input
          type="number"
          min="1"
          max="10"
          [(ngModel)]="form.numeroPeriodos"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
    </div>

    <h3 class="grupo-titulo"><i class="ti ti-123"></i> Notas</h3>
    <div class="form-grid">
      <div class="campo">
        <label>Nota mínima</label>
        <input
          type="number"
          step="0.01"
          [(ngModel)]="form.notaMinima"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
      <div class="campo">
        <label>Nota máxima</label>
        <input
          type="number"
          step="0.01"
          [(ngModel)]="form.notaMaxima"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
      <div class="campo">
        <label>Nota mínima de aprobación</label>
        <input
          type="number"
          step="0.01"
          [(ngModel)]="form.notaMinimaAprobacion"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
      <div class="campo">
        <label>Decimales</label>
        <input
          type="number"
          min="0"
          max="3"
          [(ngModel)]="form.decimalesNota"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
    </div>

    <h3 class="grupo-titulo"><i class="ti ti-settings"></i> Opciones</h3>
    <div class="form-grid">
      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.usaRecuperacion"
            [ngModelOptions]="{ standalone: true }"
          />
          Usa recuperación</label
        >
      </div>
      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.asistenciaPorClase"
            [ngModelOptions]="{ standalone: true }"
          />
          Asistencia por clase</label
        >
      </div>
      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.manejaComportamiento"
            [ngModelOptions]="{ standalone: true }"
          />
          Maneja comportamiento</label
        >
      </div>
      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.manejaPuestos"
            [ngModelOptions]="{ standalone: true }"
          />
          Maneja puestos (ranking)</label
        >
      </div>
      <div class="campo">
        <label>% inasistencia para reprobar (opcional)</label>
        <input
          type="number"
          step="0.01"
          placeholder="Ej: 20"
          [(ngModel)]="form.porcentajeInasistenciaReprobacion"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
    </div>

    <div class="form-error" *ngIf="error">
      <i class="ti ti-alert-circle"></i> {{ error }}
    </div>
    <div class="estado-msg exito" *ngIf="exito">
      <i class="ti ti-check"></i> {{ exito }}
    </div>

    <div class="form-actions">
      <button
        type="button"
        class="btn-save"
        [disabled]="guardando"
        (click)="guardar()"
      >
        <i class="ti ti-device-floppy"></i>
        {{ guardando ? "Guardando..." : "Guardar configuración" }}
      </button>
    </div>
  </div>
</div>
