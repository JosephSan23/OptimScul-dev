<div class="page-header">
  <h1>{{ modoEdicion ? "Editar año lectivo" : "Nuevo año lectivo" }}</h1>
  <p>Datos del año escolar</p>
</div>

<div *ngIf="cargando" class="estado-msg"><i class="ti ti-loader-2 girando"></i> Cargando...</div>

<div class="anio-form" *ngIf="!cargando">
  <div class="anio-form-card">

    <div class="form-grid">
      <div class="campo">
        <label>Año <span class="req">*</span></label>
        <input type="number" placeholder="2026"
               [(ngModel)]="form.anio" [ngModelOptions]="{ standalone: true }" />
      </div>
      <div class="campo">
        <label>Nombre <span class="req">*</span></label>
        <input placeholder="Año escolar 2026"
               [(ngModel)]="form.nombre" [ngModelOptions]="{ standalone: true }" />
      </div>
      <div class="campo">
        <label>Fecha inicio <span class="req">*</span></label>
        <input type="date" [(ngModel)]="form.fechaInicio" [ngModelOptions]="{ standalone: true }" />
      </div>
      <div class="campo">
        <label>Fecha fin <span class="req">*</span></label>
        <input type="date" [(ngModel)]="form.fechaFin" [ngModelOptions]="{ standalone: true }" />
      </div>
      <div class="campo">
        <label>Estado</label>
        <select [(ngModel)]="form.estado" [ngModelOptions]="{ standalone: true }">
          <option *ngFor="let e of estados" [value]="e">{{ e | titlecase }}</option>
        </select>
      </div>
      <div class="campo campo-full">
        <label>Descripción</label>
        <input placeholder="Opcional"
               [(ngModel)]="form.descripcion" [ngModelOptions]="{ standalone: true }" />
      </div>
    </div>

    <!-- preview del rango: se dibuja al elegir las fechas -->
    <div class="rango-preview" [class.vacio]="!tieneRango" [class.error]="fechasInvertidas">
      <div class="rango-head">
        <span class="rango-label"><i class="ti ti-calendar-stats"></i> El año escolar</span>
        <span class="rango-duracion" *ngIf="tieneRango && !fechasInvertidas">{{ duracionTexto }}</span>
        <span class="rango-hint" *ngIf="!tieneRango">Elige inicio y fin para verlo</span>
        <span class="rango-hint alerta" *ngIf="fechasInvertidas"><i class="ti ti-alert-triangle"></i> El fin va antes del inicio</span>
      </div>
      <div class="rango-linea" *ngIf="tieneRango && !fechasInvertidas">
        <span class="rango-punto ini"><i class="ti ti-flag"></i></span>
        <span class="rango-barra"></span>
        <span class="rango-punto fin"><i class="ti ti-flag-check"></i></span>
      </div>
      <div class="rango-fechas" *ngIf="tieneRango && !fechasInvertidas">
        <span>{{ form.fechaInicio | date:'d MMM y' }}</span>
        <span>{{ form.fechaFin | date:'d MMM y' }}</span>
      </div>
    </div>

    <div class="form-error" *ngIf="error"><i class="ti ti-alert-circle"></i> {{ error }}</div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
      <button type="button" class="btn-save" [disabled]="guardando" (click)="guardar()">
        <i class="ti girando" *ngIf="guardando" [ngClass]="'ti-loader-2'"></i>
        <i class="ti" *ngIf="!guardando" [ngClass]="modoEdicion ? 'ti-device-floppy' : 'ti-plus'"></i>
        {{ guardando ? "Guardando..." : modoEdicion ? "Guardar cambios" : "Crear año" }}
      </button>
    </div>

  </div>
</div>
