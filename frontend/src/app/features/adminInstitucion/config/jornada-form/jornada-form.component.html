<div class="page-header">
  <h1>{{ modoEdicion ? 'Editar jornada' : 'Nueva jornada' }}</h1>
  <p>Datos de la jornada</p>
</div>

<div *ngIf="cargando" class="estado-msg"><i class="ti ti-loader-2 girando"></i> Cargando...</div>

<div class="jornada-form" *ngIf="!cargando">
  <div class="jornada-form-card">

    <div class="form-grid">
      <div class="campo"><label>Código <span class="req">*</span></label>
        <input placeholder="Ej: JOR-M" [(ngModel)]="form.codigo" [ngModelOptions]="{standalone:true}"></div>
      <div class="campo"><label>Nombre <span class="req">*</span></label>
        <input placeholder="Mañana, Tarde..." [(ngModel)]="form.nombre" [ngModelOptions]="{standalone:true}"></div>
      <div class="campo"><label>Hora inicio</label>
        <input type="time" [(ngModel)]="form.horaInicio" [ngModelOptions]="{standalone:true}"></div>
      <div class="campo"><label>Hora fin</label>
        <input type="time" [(ngModel)]="form.horaFin" [ngModelOptions]="{standalone:true}"></div>
      <div class="campo campo-full"><label>Descripción</label>
        <input placeholder="Opcional" [(ngModel)]="form.descripcion" [ngModelOptions]="{standalone:true}"></div>
    </div>

    <!-- preview en vivo de la franja: se pinta mientras eliges las horas -->
    <div class="jornada-preview" [class.vacio]="!tieneHorario">
      <div class="preview-head">
        <span class="preview-label"><i class="ti ti-clock"></i> Franja en el día</span>
        <span class="preview-duracion" *ngIf="tieneHorario">{{ duracionTexto }}</span>
        <span class="preview-hint" *ngIf="!tieneHorario">Elige hora de inicio y fin para verla</span>
      </div>
      <div class="timeline-track">
        <ng-container *ngIf="tieneHorario">
          <span class="timeline-fill" [style.left.%]="pctInicio" [style.width.%]="pctAncho"></span>
          <span class="timeline-fill" *ngIf="cruzaMedianoche" [style.left.%]="0" [style.width.%]="pctAnchoMadrugada"></span>
        </ng-container>
      </div>
      <div class="timeline-horas">
        <span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span>
      </div>
      <p class="preview-nota" *ngIf="cruzaMedianoche">
        <i class="ti ti-moon"></i> Esta jornada cruza la medianoche.
      </p>
    </div>

    <div class="form-error" *ngIf="error"><i class="ti ti-alert-circle"></i> {{ error }}</div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
      <button type="button" class="btn-save" [disabled]="guardando" (click)="guardar()">
        <i class="ti" [ngClass]="modoEdicion ? 'ti-device-floppy' : 'ti-plus'"></i>
        {{ guardando ? 'Guardando...' : (modoEdicion ? 'Guardar cambios' : 'Crear jornada') }}
      </button>
    </div>

  </div>
</div>
