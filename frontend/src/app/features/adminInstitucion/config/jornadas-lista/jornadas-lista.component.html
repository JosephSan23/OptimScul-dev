<div class="page-header">
  <h1>Jornadas</h1>
  <p>Gestiona las jornadas de tu institución</p>
</div>

<div *ngIf="cargando" class="estado-msg"><i class="ti ti-loader-2 girando"></i> Cargando jornadas...</div>
<div *ngIf="error" class="estado-msg error">{{ error }}</div>

<app-tabla-paginada *ngIf="!cargando"
  [items]="jornadas"
  [camposBusqueda]="['codigo','nombre']"
  placeholderBusqueda="Buscar por nombre o código..."
  mensajeVacio="Aún no hay jornadas creadas.">

  <div acciones>
    <a class="btn-save" routerLink="/dashboard/jornadas/nuevo"><i class="ti ti-plus"></i> Nueva jornada</a>
  </div>

  <!-- el template de fila no tiene que ser una tabla:
       aquí son tarjetas-franja con línea de tiempo del día -->
  <ng-template filaTabla let-pagina>
    <div class="jornadas-lista">

      <div class="jornada-card"
           *ngFor="let j of pagina"
           [class.inactiva]="j.estado !== 'ACTIVO'">

        <!-- fila superior: identidad + horario + acciones -->
        <div class="jornada-top">
          <div class="jornada-ident">
            <span class="jornada-ico"><i class="ti" [ngClass]="iconoJornada(j)"></i></span>
            <div>
              <div class="jornada-nombre">
                <h3>{{ j.nombre }}</h3>
                <span class="jornada-codigo">{{ j.codigo }}</span>
              </div>
              <span class="badge-estado" [ngClass]="'estado-' + j.estado.toLowerCase()">{{ j.estado | titlecase }}</span>
            </div>
          </div>

          <div class="jornada-horario" *ngIf="tieneHorario(j)">
            <b>{{ j.horaInicio }}</b>
            <i class="ti ti-arrow-narrow-right"></i>
            <b>{{ j.horaFin }}</b>
            <span class="jornada-duracion">{{ duracionTexto(j) }}</span>
          </div>
          <div class="jornada-horario sin-horario" *ngIf="!tieneHorario(j)">
            <span>Sin horario definido</span>
          </div>

          <div class="acciones">
            <a class="btn-accion" title="Editar" [routerLink]="['/dashboard/jornadas', j.id]"><i class="ti ti-pencil"></i></a>
            <button *ngIf="j.estado === 'ACTIVO'" class="btn-accion peligro" title="Inactivar"
                    [disabled]="procesandoId === j.id" (click)="inactivar(j)"><i class="ti ti-toggle-left"></i></button>
            <button *ngIf="j.estado !== 'ACTIVO'" class="btn-accion exito" title="Activar"
                    [disabled]="procesandoId === j.id" (click)="activar(j)"><i class="ti ti-toggle-right"></i></button>
          </div>
        </div>

        <!-- línea de tiempo del día: 0h → 24h -->
        <div class="jornada-timeline" *ngIf="tieneHorario(j)">
          <div class="timeline-track">
            <span class="timeline-fill"
                  [style.left.%]="pctInicio(j)"
                  [style.width.%]="pctAncho(j)"></span>
            <!-- tramo de madrugada si la jornada cruza medianoche -->
            <span class="timeline-fill wrap"
                  *ngIf="cruzaMedianoche(j)"
                  [style.left.%]="0"
                  [style.width.%]="pctAnchoMadrugada(j)"></span>
          </div>
          <div class="timeline-horas">
            <span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>24h</span>
          </div>
        </div>

      </div>
    </div>
  </ng-template>
</app-tabla-paginada>
