<div class="page-header">
  <h1>{{ modoEdicion ? "Editar asignatura" : "Nueva asignatura" }}</h1>
  <p>Datos de la asignatura</p>
</div>

<div *ngIf="cargando" class="estado-msg">
  <i class="ti ti-loader-2 girando"></i> Cargando...
</div>

<div class="asignatura-form" *ngIf="!cargando">
  <div class="asignatura-form-card">
    <div class="form-grid">
      <div class="campo">
        <label>Código <span class="req">*</span></label>
        <input
          placeholder="Ej: MAT-01"
          [(ngModel)]="form.codigo"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>
      <div class="campo">
        <label>Nombre <span class="req">*</span></label>
        <input
          placeholder="Matemáticas, Biología..."
          [(ngModel)]="form.nombre"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>

      <div class="campo">
        <label>Área</label>
        <select
          [(ngModel)]="form.areaId"
          [ngModelOptions]="{ standalone: true }"
        >
          <option value="">Sin área</option>
          <option *ngFor="let a of areas" [value]="a.id">{{ a.nombre }}</option>
        </select>
      </div>

      <div class="campo">
        <label>Intensidad horaria semanal</label>
        <input
          type="number"
          min="1"
          placeholder="Horas por semana (opcional)"
          [(ngModel)]="form.intensidadHorariaSemanal"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>

      <div class="campo campo-full">
        <label>Descripción</label>
        <input
          placeholder="Opcional"
          [(ngModel)]="form.descripcion"
          [ngModelOptions]="{ standalone: true }"
        />
      </div>

      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.requiereCalificacion"
            [ngModelOptions]="{ standalone: true }"
          />
          Requiere calificación</label
        >
      </div>
      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.requiereRecuperacion"
            [ngModelOptions]="{ standalone: true }"
          />
          Requiere recuperación</label
        >
      </div>
      <div class="campo campo-check">
        <label
          ><input
            type="checkbox"
            [(ngModel)]="form.esComportamiento"
            [ngModelOptions]="{ standalone: true }"
          />
          Es de comportamiento</label
        >
      </div>
    </div>

    <div class="form-error" *ngIf="error">
      <i class="ti ti-alert-circle"></i> {{ error }}
    </div>

    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="cancelar()">
        Cancelar
      </button>
      <button
        type="button"
        class="btn-save"
        [disabled]="guardando"
        (click)="guardar()"
      >
        <i
          class="ti"
          [ngClass]="modoEdicion ? 'ti-device-floppy' : 'ti-plus'"
        ></i>
        {{
          guardando
            ? "Guardando..."
            : modoEdicion
              ? "Guardar cambios"
              : "Crear asignatura"
        }}
      </button>
    </div>
  </div>
</div>
