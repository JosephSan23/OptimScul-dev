<div class="page-header">
  <a
    routerLink="/dashboard/anios-lectivos"
    style="font-size: 0.85rem; color: #2563eb; text-decoration: none"
    >← Años lectivos</a
  >
  <h1>Periodos</h1>
  <p>Cortes académicos del año lectivo</p>
</div>

<div *ngIf="cargando" class="estado-msg">Cargando...</div>
<div *ngIf="error" class="estado-msg error">{{ error }}</div>

<app-tabla-paginada
  *ngIf="!cargando"
  [items]="periodos"
  [camposBusqueda]="['nombre', 'numero', 'estado']"
  placeholderBusqueda="Buscar periodo..."
  mensajeVacio="Aún no hay periodos en este año."
>
  <div acciones>
    <a
      class="btn-save"
      [routerLink]="['/dashboard/anios-lectivos', anioId, 'periodos', 'nuevo']"
    >
      <i class="ti ti-plus"></i> Nuevo periodo
    </a>
  </div>

  <ng-template filaTabla let-pagina>
    <table class="tabla-admins">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Inicio</th>
          <th>Fin</th>
          <th>Peso</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of pagina">
          <td>{{ p.numero }}</td>
          <td>{{ p.nombre }}</td>
          <td>{{ p.fechaInicio || "—" }}</td>
          <td>{{ p.fechaFin || "—" }}</td>
          <td>{{ p.peso != null ? p.peso : "—" }}</td>
          <td>
            <span
              class="badge-estado"
              [ngClass]="'estado-' + p.estado.toLowerCase()"
              >{{ p.estado | titlecase }}</span
            >
          </td>
          <td class="acciones">
            <a
              class="btn-icon"
              title="Editar"
              [routerLink]="['/dashboard/periodos', p.id]"
              ><i class="ti ti-pencil"></i
            ></a>
          </td>
        </tr>
      </tbody>
    </table>
  </ng-template>
</app-tabla-paginada>
