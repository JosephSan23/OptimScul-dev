<div class="page-header">
  <h1>{{ modoEdicion ? "Editar periodo" : "Nuevo periodo" }}</h1>
  <p>Datos del periodo académico</p>
</div>

<div *ngIf="cargando" class="estado-msg">Cargando...</div>

<div class="form-grid" *ngIf="!cargando" style="max-width: 760px">
  <div class="campo">
    <label>Número *</label
    ><input
      type="number"
      [(ngModel)]="form.numero"
      [ngModelOptions]="{ standalone: true }"
      placeholder="1"
    />
  </div>
  <div class="campo">
    <label>Nombre *</label
    ><input
      [(ngModel)]="form.nombre"
      [ngModelOptions]="{ standalone: true }"
      placeholder="Primer bimestre"
    />
  </div>
  <div class="campo">
    <label>Fecha inicio *</label
    ><input
      type="date"
      [(ngModel)]="form.fechaInicio"
      [ngModelOptions]="{ standalone: true }"
    />
  </div>
  <div class="campo">
    <label>Fecha fin *</label
    ><input
      type="date"
      [(ngModel)]="form.fechaFin"
      [ngModelOptions]="{ standalone: true }"
    />
  </div>
  <div class="campo">
    <label>Peso (%)</label
    ><input
      type="number"
      placeholder="Opcional"
      [(ngModel)]="form.peso"
      [ngModelOptions]="{ standalone: true }"
    />
  </div>
  <div class="campo">
    <label>Estado</label>
    <select [(ngModel)]="form.estado" [ngModelOptions]="{ standalone: true }">
      <option *ngFor="let e of estados" [value]="e">{{ e | titlecase }}</option>
    </select>
  </div>
  <div class="campo campo-full">
    <label>Descripción</label
    ><input
      placeholder="Opcional"
      [(ngModel)]="form.descripcion"
      [ngModelOptions]="{ standalone: true }"
    />
  </div>

  <div class="form-error" *ngIf="error">{{ error }}</div>

  <div class="form-actions">
    <button type="button" class="btn-cancel" (click)="cancelar()">
      Cancelar
    </button>
    <button
      type="button"
      class="btn-save"
      [disabled]="guardando"
      (click)="guardar()"
    >
      <i
        class="ti"
        [ngClass]="modoEdicion ? 'ti-device-floppy' : 'ti-plus'"
      ></i>
      {{
        guardando
          ? "Guardando..."
          : modoEdicion
            ? "Guardar cambios"
            : "Crear periodo"
      }}
    </button>
  </div>
</div>
