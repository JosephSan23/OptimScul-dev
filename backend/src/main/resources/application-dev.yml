spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/optimscul
    username: optimscul
    password: optimscul1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    schemas: optimscul
    locations: classpath:db/migration

logging:
  level:
    com.optimscul: DEBUG
    org.flywaydb: INFO