services:
  backend:
    image: optimscul-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 86400000
      DB_URL: jdbc:postgresql://postgres:5432/optimscul
      DB_USERNAME: optimscul
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      - postgres
    networks:
      - optimscul_net
  postgres:
    image: postgres:16-alpine
    container_name: optimscul_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: optimscul
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: optimscul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - optimscul_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: optimscul_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@optimscul.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD} 
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - optimscul_net

volumes:
  postgres_data:

networks:
  optimscul_net:
    driver: bridge