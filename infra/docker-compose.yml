services:

  postgres:
    image: postgres:16-alpine
    container_name: optimscul_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: optimscul
      POSTGRES_PASSWORD: optimscul1234
      POSTGRES_DB: optimscul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - optimscul_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: optimscul_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@optimscul.com
      PGADMIN_DEFAULT_PASSWORD: admin1234
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - optimscul_net

volumes:
  postgres_data:

networks:
  optimscul_net:
    driver: bridge